<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Engine-Free 3D Game Framework</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Segoe UI', Arial, sans-serif;
  touch-action: none;
}
#rotate-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: #0a0a0a;
  color: #fff;
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  font-size: 16px;
  padding: 20px;
}
#rotate-overlay .icon { font-size: 48px; margin-bottom: 14px; animation: rotate-hint 1.6s ease-in-out infinite; }
@keyframes rotate-hint { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } }
@media (orientation: portrait) {
  #rotate-overlay { display: flex; }
  #app { display: none; }
}
#app {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}
#game-canvas {
  display: block;
  width: 100%;
  height: 100%;
  outline: none;
}
#hud {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 30;
}
#crosshair {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 26px;
  height: 26px;
  margin: -13px 0 0 -13px;
  pointer-events: none;
  z-index: 31;
}
#crosshair .ch-ring {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  border: 2px solid rgba(255,255,255,0.8);
  border-radius: 50%;
  box-sizing: border-box;
  transition: transform 0.1s ease-out, border-color 0.12s ease;
}
#crosshair .ch-dot {
  position: absolute;
  top: 50%; left: 50%;
  width: 3px; height: 3px;
  margin: -1.5px 0 0 -1.5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.9);
}
#crosshair.target-lock .ch-ring { border-color: #ff3b3b; }
#crosshair.expanded .ch-ring { transform: scale(1.35); }
#crosshair.swing .ch-ring { transform: scale(1.6); border-color: #ffcc33; }

#fps-counter {
  position: absolute;
  top: 12px;
  left: 12px;
  color: #0f0;
  font-size: 12px;
  font-family: monospace;
  background: rgba(0, 0, 0, 0.4);
  padding: 4px 8px;
  border-radius: 4px;
}
.ui-btn {
  pointer-events: auto;
  border: 2px solid rgba(255, 255, 255, 0.5);
  background: rgba(20, 20, 20, 0.55);
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(2px);
}
#cam-switch-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 40px;
  height: 40px;
  font-size: 16px;
}
#inventory-btn {
  position: absolute;
  top: 12px;
  right: 58px;
  width: 40px;
  height: 40px;
  font-size: 16px;
}
#mobile-controls {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 20;
  display: none;
}
#mobile-controls.active { display: block; }
.control-zone {
  position: absolute;
  bottom: 0;
  height: 55%;
  pointer-events: auto;
  touch-action: none;
}
#joystick-zone { position: absolute; left: 0; right: auto; width: 50%; z-index: 22; pointer-events: auto; bottom: 0; top: auto; height: 55%; }
#look-zone { position: absolute; right: 0; left: auto; width: 50%; z-index: 21; pointer-events: auto; top: 0; height: 100%; touch-action: none; }
#joystick-base {
  position: absolute;
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.12);
  border: 2px solid rgba(255, 255, 255, 0.35);
  left: 40px;
  bottom: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
#joystick-knob {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.55);
  border: 2px solid rgba(255, 255, 255, 0.8);
  position: relative;
  pointer-events: none;
}
.small-btn {
  position: absolute;
  border-radius: 50%;
  font-size: 10px;
  font-weight: bold;
  z-index: 26;
}
.small-btn:active, .ui-btn:active { transform: scale(0.9); background: rgba(60,60,60,0.75); }
.small-btn.disabled { opacity: 0.35; pointer-events: none; }

#jump-btn { right: 14px; bottom: 56px; width: 60px; height: 60px; font-size: 12px; }
#pickup-btn { display: none; right: 14px; top: 144px; width: 44px; height: 44px; background: rgba(40,140,80,0.55); backdrop-filter: blur(6px); }
#pickup-btn.visible { display: flex; }

#interact-prompt {
  position: absolute;
  top: 58%;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  background: rgba(0,0,0,0.55);
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 13px;
  display: none;
  z-index: 31;
  white-space: nowrap;
}
#interact-prompt.visible { display: block; }

#hit-marker {
  position: absolute;
  top: 50%; left: 50%;
  width: 26px; height: 26px;
  margin: -13px 0 0 -13px;
  pointer-events: none;
  opacity: 0;
  z-index: 32;
}
#hit-marker.show { animation: hitmarker-pop 0.25s ease-out; }
@keyframes hitmarker-pop {
  0% { opacity: 1; transform: scale(0.6); }
  60% { opacity: 1; transform: scale(1.1); }
  100% { opacity: 0; transform: scale(1.3); }
}
#hit-marker::before, #hit-marker::after {
  content: '';
  position: absolute;
  background: #fff;
  width: 3px; height: 10px;
}
#hit-marker::before { top: 0; left: 0; transform: rotate(45deg); transform-origin: bottom; }
#hit-marker::after { top: 0; right: 0; transform: rotate(-45deg); transform-origin: bottom; }

#damage-flash {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(circle, transparent 40%, rgba(255,0,0,0.35) 100%);
  opacity: 0;
  pointer-events: none;
  z-index: 29;
  transition: opacity 0.3s ease;
}
#damage-flash.show { opacity: 1; transition: opacity 0.05s ease; }

#pickup-toast {
  position: absolute;
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  background: rgba(0,0,0,0.6);
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 14px;
  opacity: 0;
  z-index: 31;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
#pickup-toast.show { opacity: 1; transform: translateX(-50%) translateY(10px); }

#weapon-hud {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  font-family: monospace;
  font-size: 13px;
  font-weight: bold;
  letter-spacing: 1px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  z-index: 31;
  text-align: center;
  background: rgba(0,0,0,0.35);
  padding: 4px 12px;
  border-radius: 6px;
}

#inventory-panel {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(10,10,14,0.55);
  backdrop-filter: blur(4px);
  z-index: 40;
  display: none;
  align-items: center;
  justify-content: center;
  pointer-events: auto;
}
#inventory-panel.visible { display: flex; }
#inventory-panel .panel-box {
  background: rgba(40,42,54,0.55);
  backdrop-filter: blur(14px) saturate(140%);
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 12px;
  padding: 16px;
  min-width: 300px;
  max-width: 88vw;
  color: #fff;
  font-family: 'Courier New', monospace;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
}
#inventory-panel h3 {
  margin-bottom: 12px; font-size: 13px; letter-spacing: 2px; opacity: 0.85;
  text-align: center; text-shadow: 0 1px 2px rgba(0,0,0,0.6);
}
#inventory-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  max-height: 56vh;
  overflow-y: auto;
  padding: 6px;
}
.inv-slot {
  aspect-ratio: 1;
  min-width: 56px;
  background: rgba(20,20,28,0.55);
  border: 2px solid rgba(255,255,255,0.18);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: grab;
  position: relative;
  backdrop-filter: blur(6px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), inset 0 -2px 4px rgba(0,0,0,0.3);
  transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
}
.inv-slot:active { cursor: grabbing; transform: scale(0.94); }
.inv-slot.equipped { border-color: #ffcc33; background: rgba(255,204,51,0.16); box-shadow: 0 0 10px rgba(255,204,51,0.4), inset 0 1px 0 rgba(255,255,255,0.2); }
.inv-slot.drag-over { border-color: #6fdcff; background: rgba(111,220,255,0.16); }
.inv-slot.empty { cursor: default; opacity: 0.5; }
.inv-slot .slot-icon { font-size: 22px; line-height: 1; margin-bottom: 2px; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.6)); }
.inv-slot .slot-label { font-size: 8px; letter-spacing: 0.5px; opacity: 0.9; text-align: center; padding: 0 2px; }
.inv-slot .slot-stat { position: absolute; bottom: 2px; right: 4px; font-size: 8px; color: #ffcc33; }
#inventory-drop-zone {
  margin-top: 12px;
  padding: 10px;
  border: 2px dashed rgba(255,90,90,0.5);
  border-radius: 8px;
  text-align: center;
  font-size: 10px;
  letter-spacing: 1px;
  color: rgba(255,150,150,0.85);
  background: rgba(180,30,30,0.08);
  backdrop-filter: blur(6px);
  transition: background 0.15s ease, border-color 0.15s ease;
}
#inventory-drop-zone.drag-over { background: rgba(180,30,30,0.25); border-color: #ff5a5a; color: #fff; }
#inventory-empty-msg { opacity: 0.55; font-size: 11px; text-align: center; padding: 16px 8px; grid-column: 1 / -1; }
#inventory-close {
  margin-top: 14px;
  width: 100%;
  padding: 9px;
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.3);
  color: #fff;
  border-radius: 8px;
  font-family: 'Courier New', monospace;
  letter-spacing: 1px;
  cursor: pointer;
  backdrop-filter: blur(6px);
}
#inventory-close:active { background: rgba(255,255,255,0.22); }
#loading-screen {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0a0a0a;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  z-index: 100;
  transition: opacity 0.5s ease;
}
#loading-screen.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
  <div id="rotate-overlay">
    <div class="icon">📱</div>
    <div>Please rotate your device to landscape<br/>for the best experience</div>
  </div>

  <div id="app">
    <canvas id="game-canvas"></canvas>

    <div id="hud">
      <div id="crosshair">
        <div class="ch-ring"></div>
        <div class="ch-dot"></div>
      </div>
      <button id="cam-switch-btn" class="ui-btn">🎥</button>
      <button id="inventory-btn" class="ui-btn">🎒</button>
      <div id="fps-counter">FPS: 0</div>
      <div id="weapon-hud">UNARMED</div>
      <div id="interact-prompt"></div>
      <div id="hit-marker"></div>
      <div id="damage-flash"></div>
      <div id="pickup-toast"></div>
    </div>

    <div id="mobile-controls">
      <div id="joystick-zone" class="control-zone">
        <div id="joystick-base">
          <div id="joystick-knob"></div>
        </div>
      </div>
      <div id="look-zone"></div>
      <button id="jump-btn" class="ui-btn small-btn">JUMP</button>
      <button id="pickup-btn" class="ui-btn small-btn">PICKUP</button>
    </div>

    <div id="inventory-panel">
      <div class="panel-box">
        <h3>INVENTORY</h3>
        <div id="inventory-grid"></div>
        <div id="inventory-drop-zone">DRAG HERE TO DROP</div>
        <button id="inventory-close">CLOSE</button>
      </div>
    </div>

    <div id="loading-screen">
      <div id="loading-text">Loading World...</div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.js"
    }
  }
  </script>

  <script type="module">
import * as THREE from 'three';

const CONFIG = {
  world: { groundSize: 200, groundTextureRepeat: 40 },
  render: { shadowMapSize: 512, pixelRatioCap: 1, fogNear: 40, fogFar: 160 },
  player: {
    height: 1.8, radius: 0.35,
    walkSpeed: 3.2, runSpeed: 6.2,
    acceleration: 18, deceleration: 14, airControl: 0.35,
    jumpForce: 6.2, gravity: -18,
    turnSmoothing: 12, maxStepHeight: 0.35, maxSlopeAngle: 45,
  },
  camera: {
    fov: 65, near: 0.1, far: 1000,
    thirdPerson: { distance: 4.5, minDistance: 1.2, maxDistance: 7, height: 1.6, followLerp: 8, collisionPadding: 0.3 },
    firstPerson: { headHeight: 1.65 },
    switchLerp: 6, verticalMinDeg: -80, verticalMaxDeg: 80,
  },
  input: { mouseSensitivity: 0.0022, touchLookSensitivity: 0.0032, joystickDeadzone: 0.12, joystickRunThreshold: 0.72 },
  lighting: { sunColor: 0xfff2d6, sunIntensity: 2.4, ambientColor: 0xbdd6ff, ambientIntensity: 0.55 },
};

function tryLockLandscape() {
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(() => {});
  }
}

class GameRenderer {
  constructor(canvas) {
    this.canvas = canvas;
    this.renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: 'high-performance' });
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, CONFIG.render.pixelRatioCap));
    this.renderer.shadowMap.enabled = true;
    this.renderer.shadowMap.type = THREE.PCFShadowMap;
    this.renderer.outputColorSpace = THREE.SRGBColorSpace;
    this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
    this.renderer.toneMappingExposure = 1.05;

    this.scene = new THREE.Scene();
    this.scene.fog = new THREE.Fog(0xbfd9ff, CONFIG.render.fogNear, CONFIG.render.fogFar);
    this.camera = new THREE.PerspectiveCamera(CONFIG.camera.fov, 1, CONFIG.camera.near, CONFIG.camera.far);

    this._resizeHandler = () => this.resize();
    window.addEventListener('resize', this._resizeHandler);
    this.resize();
  }
  resize() {
    const w = window.innerWidth, h = window.innerHeight;
    this.renderer.setSize(w, h, false);
    this.camera.aspect = w / h;
    this.camera.updateProjectionMatrix();
  }
  render() { this.renderer.render(this.scene, this.camera); }
}

const SKY_VERTEX_SHADER = `
varying vec3 vWorldPosition;
void main() {
  vec4 worldPosition = modelMatrix * vec4(position, 1.0);
  vWorldPosition = worldPosition.xyz;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}`;
const SKY_FRAGMENT_SHADER = `
uniform vec3 topColor;
uniform vec3 bottomColor;
uniform vec3 sunColor;
uniform vec3 sunDirection;
uniform float offset;
uniform float exponent;
varying vec3 vWorldPosition;
void main() {
  float h = normalize(vWorldPosition + offset).y;
  vec3 skyColor = mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0));
  float sunAmount = max(dot(normalize(vWorldPosition), sunDirection), 0.0);
  vec3 sunGlow = sunColor * pow(sunAmount, 8.0) * 0.6;
  gl_FragColor = vec4(skyColor + sunGlow, 1.0);
}`;
const SKY_PRESETS = {
  morning: { top: new THREE.Color(0x4a90d9), bottom: new THREE.Color(0xdff2ff), sun: new THREE.Color(0xfff0c0), sunAngle: 25, fogColor: 0xcfe6ff },
  evening: { top: new THREE.Color(0x2c3e6b), bottom: new THREE.Color(0xff8c5a), sun: new THREE.Color(0xff7043), sunAngle: 8, fogColor: 0xe8a273 },
  night:   { top: new THREE.Color(0x02030a), bottom: new THREE.Color(0x0a1030), sun: new THREE.Color(0x8fa8ff), sunAngle: -10, fogColor: 0x05070f },
};

const USE_IMAGE_SKYBOX = true;
const SKYBOX_PATH = 'skybox/';
const SKYBOX_FACES = ['right.png', 'left.png', 'top.png', 'bottom.png', 'front.png', 'back.png'];

class Skybox {
  constructor(scene, radius = 480) {
    this.scene = scene;
    this.timeOfDay = 'morning';
    if (USE_IMAGE_SKYBOX) this._buildImageSkybox(scene);
    else this._buildProceduralSkybox(scene, radius);
    this._buildClouds(radius);
  }

  _buildImageSkybox(scene) {
    const loader = new THREE.CubeTextureLoader();
    loader.setPath(SKYBOX_PATH);
    loader.load(
      SKYBOX_FACES,
      (cubeTexture) => {
        cubeTexture.colorSpace = THREE.SRGBColorSpace;
        scene.background = cubeTexture;
        if (this.mesh) { scene.remove(this.mesh); this.mesh = null; }
      },
      undefined,
      () => {
        console.warn('Skybox images not found at "' + SKYBOX_PATH + '" — using procedural sky instead.');
        this._buildProceduralSkybox(scene, 480);
      }
    );
  }

  _buildProceduralSkybox(scene, radius) {
    const geometry = new THREE.SphereGeometry(radius, 32, 16);
    this.uniforms = {
      topColor: { value: SKY_PRESETS.morning.top.clone() },
      bottomColor: { value: SKY_PRESETS.morning.bottom.clone() },
      sunColor: { value: SKY_PRESETS.morning.sun.clone() },
      sunDirection: { value: new THREE.Vector3(0, 1, 0) },
      offset: { value: 15 },
      exponent: { value: 0.6 },
    };
    const material = new THREE.ShaderMaterial({
      uniforms: this.uniforms, vertexShader: SKY_VERTEX_SHADER, fragmentShader: SKY_FRAGMENT_SHADER,
      side: THREE.BackSide, depthWrite: false, fog: false,
    });
    this.mesh = new THREE.Mesh(geometry, material);
    this.mesh.renderOrder = -1000;
    scene.add(this.mesh);
    this.setTimeOfDay('morning');
  }

  _buildClouds(radius) {
    this.cloudGroup = new THREE.Group();
    const cloudTexture = this._generateCloudTexture();
    const cloudMaterial = new THREE.SpriteMaterial({ map: cloudTexture, transparent: true, opacity: 0.75, depthWrite: false, fog: false });
    const cloudRadius = radius * 0.85;
    for (let i = 0; i < 26; i++) {
      const sprite = new THREE.Sprite(cloudMaterial.clone());
      const theta = Math.random() * Math.PI * 2;
      const heightFactor = 0.25 + Math.random() * 0.35;
      const y = cloudRadius * heightFactor;
      const horizontalR = Math.sqrt(Math.max(cloudRadius * cloudRadius - y * y, 0));
      sprite.position.set(Math.cos(theta) * horizontalR, y, Math.sin(theta) * horizontalR);
      const scale = 60 + Math.random() * 80;
      sprite.scale.set(scale, scale * 0.5, 1);
      sprite.userData.driftSpeed = 0.15 + Math.random() * 0.25;
      sprite.userData.baseTheta = theta;
      sprite.userData.horizontalR = horizontalR;
      this.cloudGroup.add(sprite);
    }
    this.scene.add(this.cloudGroup);
  }

  _generateCloudTexture() {
    const size = 128;
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    const gradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
    gradient.addColorStop(0, 'rgba(255,255,255,0.9)');
    gradient.addColorStop(0.5, 'rgba(255,255,255,0.4)');
    gradient.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, size, size);
    const texture = new THREE.CanvasTexture(canvas);
    texture.needsUpdate = true;
    return texture;
  }

  setTimeOfDay(name) {
    const preset = SKY_PRESETS[name];
    if (!preset) return;
    this.timeOfDay = name;
    if (this.uniforms) {
      this.uniforms.topColor.value.copy(preset.top);
      this.uniforms.bottomColor.value.copy(preset.bottom);
      this.uniforms.sunColor.value.copy(preset.sun);
      const angleRad = THREE.MathUtils.degToRad(preset.sunAngle);
      this.uniforms.sunDirection.value.set(Math.cos(angleRad), Math.sin(angleRad), 0.3).normalize();
    }
    if (this.scene.fog) this.scene.fog.color.setHex(preset.fogColor);
  }

  update(delta) {
    if (!this.cloudGroup) return;
    for (const sprite of this.cloudGroup.children) {
      sprite.userData.baseTheta += sprite.userData.driftSpeed * delta * 0.02;
      const theta = sprite.userData.baseTheta;
      sprite.position.x = Math.cos(theta) * sprite.userData.horizontalR;
      sprite.position.z = Math.sin(theta) * sprite.userData.horizontalR;
    }
  }
}

class World {
  constructor(scene) {
    this.scene = scene;
    this.collidables = [];
    this.ramps = [];
    this.enemies = [];
    this.pickups = [];

    this._buildLighting();
    this.skybox = new Skybox(scene);
    this._buildGround();
    this._buildTestObjects();
    this._buildDemoEnemies();
    this._buildDemoPickups();
  }

  _buildLighting() {
    const { sunColor, sunIntensity, ambientColor, ambientIntensity } = CONFIG.lighting;
    this.sun = new THREE.DirectionalLight(sunColor, sunIntensity);
    this.sun.position.set(60, 90, 40);
    this.sun.castShadow = true;
    this.sun.shadow.mapSize.set(CONFIG.render.shadowMapSize, CONFIG.render.shadowMapSize);
    this.sun.shadow.camera.left = -45;
    this.sun.shadow.camera.right = 45;
    this.sun.shadow.camera.top = 45;
    this.sun.shadow.camera.bottom = -45;
    this.sun.shadow.camera.near = 1;
    this.sun.shadow.camera.far = 200;
    this.sun.shadow.bias = -0.0005;
    this.scene.add(this.sun);
    this.scene.add(this.sun.target);
    this.ambient = new THREE.HemisphereLight(0xffffff, ambientColor, ambientIntensity);
    this.scene.add(this.ambient);
  }

  _buildGround() {
    const size = CONFIG.world.groundSize;
    const repeat = CONFIG.world.groundTextureRepeat;
    const texture = this._generateGroundTexture();
    texture.wrapS = THREE.RepeatWrapping;
    texture.wrapT = THREE.RepeatWrapping;
    texture.repeat.set(repeat, repeat);
    texture.anisotropy = 8;

    const geometry = new THREE.PlaneGeometry(size, size, 1, 1);
    const material = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.95, metalness: 0.02 });
    this.ground = new THREE.Mesh(geometry, material);
    this.ground.rotation.x = -Math.PI / 2;
    this.ground.receiveShadow = true;
    this.ground.userData.isGround = true;
    this.scene.add(this.ground);
    this.groundSize = size;
  }

  _generateGroundTexture() {
    const size = 256;
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#8d9096';
    ctx.fillRect(0, 0, size, size);
    ctx.strokeStyle = '#6d7075';
    ctx.lineWidth = 3;
    ctx.strokeRect(0, 0, size, size);
    for (let i = 0; i < 400; i++) {
      ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.04})`;
      ctx.fillRect(Math.random() * size, Math.random() * size, 2, 2);
    }
    return new THREE.CanvasTexture(canvas);
  }

  _buildTestObjects() {
    const boxMat = new THREE.MeshStandardMaterial({ color: 0x5a6270, roughness: 0.8 });
    const rampMat = new THREE.MeshStandardMaterial({ color: 0x707680, roughness: 0.85 });
    const accentMat = new THREE.MeshStandardMaterial({ color: 0x2f6fed, roughness: 0.5, metalness: 0.1 });

    this._addBox([-14, 1, -4], [3, 2, 3], boxMat);
    this._addBox([14, 1.5, -6], [4, 3, 4], boxMat);
    this._addBox([-6, 0.5, 6], [1, 1, 1], boxMat);
    this._addBox([-4, 0.5, 6], [1, 1, 1], boxMat);
    this._addBox([-2, 0.5, 6], [1, 1, 1], boxMat);
    this._addBox([-20, 1, 0], [2.5, 2, 2.5], accentMat);
    this._addBox([20, 1, 0], [2.5, 2, 2.5], accentMat);
    this._buildStairs([0, 0, -18], 6, 0.35, 1.4, boxMat);
    this._addRamp([10, 0, 10], [6, 3, 6], 22, rampMat);
    this._addRamp([-10, 0, 14], [5, 2, 5], -18, rampMat);
    this._addBox([0, 2.1, -24], [8, 0.3, 6], boxMat);
  }

  _addBox(position, size, material) {
    const geometry = new THREE.BoxGeometry(size[0], size[1], size[2]);
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(position[0], position[1], position[2]);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.userData.collider = 'box';
    mesh.geometry.computeBoundingBox();
    this.scene.add(mesh);
    this.collidables.push(mesh);
    return mesh;
  }

  _addRamp(position, size, angleDeg, material) {
    const geometry = new THREE.BoxGeometry(size[0], size[1], size[2]);
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(position[0], size[1] / 2, position[2]);
    mesh.rotation.z = THREE.MathUtils.degToRad(angleDeg);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.userData.collider = 'ramp';
    mesh.userData.slopeAngle = Math.abs(angleDeg);
    mesh.geometry.computeBoundingBox();
    this.scene.add(mesh);
    this.collidables.push(mesh);
    this.ramps.push(mesh);
    return mesh;
  }

  _buildStairs(origin, steps, stepHeight, stepDepth, material) {
    for (let i = 0; i < steps; i++) {
      const geometry = new THREE.BoxGeometry(4, stepHeight * (i + 1), stepDepth);
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.set(origin[0], (stepHeight * (i + 1)) / 2, origin[2] - i * stepDepth);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData.collider = 'box';
      mesh.geometry.computeBoundingBox();
      this.scene.add(mesh);
      this.collidables.push(mesh);
    }
  }

  _buildDemoEnemies() {
    const positions = [[-8, -10], [12, -14], [0, 14]];
    for (const [x, z] of positions) this._spawnEnemy(x, z);
  }

  _spawnEnemy(x, z) {
    const group = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color: 0xb33636, roughness: 0.6 });
    const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.8, 4, 8), mat);
    torso.position.y = 1.1;
    torso.castShadow = true;
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.24, 12, 12), mat);
    head.position.y = 1.7;
    head.castShadow = true;
    group.add(torso, head);
    group.position.set(x, 0, z);
    this.scene.add(group);

    const enemy = {
      mesh: group, headMesh: head, bodyMesh: torso,
      health: 100, maxHealth: 100, alive: true,
      id: 'enemy_' + Math.random().toString(36).slice(2, 9), label: 'Hostile',
    };
    group.userData.entityType = 'enemy';
    group.userData.enemyRef = enemy;
    torso.userData.entityType = 'enemy';
    torso.userData.enemyRef = enemy;
    torso.userData.bodyPart = 'body';
    head.userData.entityType = 'enemy';
    head.userData.enemyRef = enemy;
    head.userData.bodyPart = 'head';

    this.enemies.push(enemy);
    return enemy;
  }

  removeEnemy(enemy) {
    this.scene.remove(enemy.mesh);
    this.enemies = this.enemies.filter((e) => e !== enemy);
  }

  _buildDemoPickups() {
    this._spawnPickup({ type: 'weapon', weaponId: 'sword', label: 'Sword', position: [3, 0.4, 2] });
    this._spawnPickup({ type: 'weapon', weaponId: 'axe', label: 'Axe', position: [-9, 0.4, -2] });
    this._spawnPickup({ type: 'weapon', weaponId: 'spear', label: 'Spear', position: [16, 0.4, -8] });
    this._spawnPickup({ type: 'health', amount: 50, label: 'Health Pack', position: [-4, 0.4, 8] });
    this._spawnPickup({ type: 'coin', amount: 10, label: 'Coins', position: [0, 0.4, 3] });
    this._spawnPickup({ type: 'resource', amount: 5, label: 'Wood', position: [-2, 0.4, -8] });
  }

  _spawnPickup({ type, weaponId, amount, label, position }) {
    const colorByType = { weapon: 0xffcc33, health: 0x33ff77, coin: 0xffe066, resource: 0xcc9966, quest: 0xff66cc };
    const geoByType = {
      weapon: new THREE.BoxGeometry(0.5, 0.18, 0.18),
      health: new THREE.BoxGeometry(0.32, 0.32, 0.32),
      coin: new THREE.CylinderGeometry(0.18, 0.18, 0.06, 16),
      resource: new THREE.BoxGeometry(0.3, 0.3, 0.3),
      quest: new THREE.OctahedronGeometry(0.24),
    };
    const mat = new THREE.MeshStandardMaterial({
      color: colorByType[type] ?? 0xffffff,
      emissive: colorByType[type] ?? 0x000000,
      emissiveIntensity: 0.35, roughness: 0.4, metalness: 0.3,
    });
    const mesh = new THREE.Mesh(geoByType[type] ?? geoByType.resource, mat);
    mesh.position.set(position[0], position[1], position[2]);
    mesh.castShadow = true;
    this.scene.add(mesh);

    const pickup = {
      id: 'pickup_' + Math.random().toString(36).slice(2, 9),
      type, weaponId, amount, label, mesh, baseY: position[1], collected: false,
    };
    mesh.userData.entityType = 'pickup';
    mesh.userData.pickupRef = pickup;
    this.pickups.push(pickup);
    return pickup;
  }

  removePickup(pickup) {
    this.scene.remove(pickup.mesh);
    this.pickups = this.pickups.filter((p) => p !== pickup);
  }

  addDroppedItem(pickupData) { return this._spawnPickup(pickupData); }

  update(delta, elapsed) {
    this.skybox.update(delta);
    for (const pickup of this.pickups) {
      pickup.mesh.position.y = pickup.baseY + Math.sin(elapsed * 2 + pickup.mesh.position.x) * 0.08;
      pickup.mesh.rotation.y += delta * 1.4;
    }
  }

  setTimeOfDay(name) {
    this.skybox.setTimeOfDay(name);
    const preset = { morning: 2.4, evening: 1.6, night: 0.15 }[name] ?? 2.0;
    this.sun.intensity = preset;
  }
}

const UP = new THREE.Vector3(0, 1, 0);
const _rayOrigin = new THREE.Vector3();
const _rayDown = new THREE.Vector3(0, -1, 0);
const _groundRaycaster = new THREE.Raycaster();
_groundRaycaster.far = 20;

class PhysicsWorld {
  constructor(world) {
    this.world = world;
    this._boxCache = new Map();
    for (const mesh of world.collidables) {
      if (mesh.userData.collider === 'box') this._boxCache.set(mesh, new THREE.Box3().setFromObject(mesh));
    }
  }

  _nearby(position, radius) {
    const out = [];
    for (const mesh of this.world.collidables) {
      const dx = mesh.position.x - position.x;
      const dz = mesh.position.z - position.z;
      if (dx * dx + dz * dz < (radius + 8) * (radius + 8)) out.push(mesh);
    }
    return out;
  }

  resolveHorizontal(position, radius) {
    for (const mesh of this._nearby(position, radius)) {
      if (mesh.userData.collider !== 'box') continue;
      const box = this._boxCache.get(mesh);
      const closestX = THREE.MathUtils.clamp(position.x, box.min.x, box.max.x);
      const closestZ = THREE.MathUtils.clamp(position.z, box.min.z, box.max.z);
      const dx = position.x - closestX;
      const dz = position.z - closestZ;
      const distSq = dx * dx + dz * dz;
      if (distSq < radius * radius) {
        const feetY = position.y;
        const headY = position.y + CONFIG.player.height;
        if (headY < box.min.y + 0.02 || feetY > box.max.y - 0.02) continue;
        const dist = Math.sqrt(distSq) || 0.0001;
        const pushOut = radius - dist;
        position.x += (dx / dist) * pushOut;
        position.z += (dz / dist) * pushOut;
      }
    }
    const half = this.world.groundSize / 2 - radius;
    position.x = THREE.MathUtils.clamp(position.x, -half, half);
    position.z = THREE.MathUtils.clamp(position.z, -half, half);
  }

  sampleGroundHeight(position) {
    _rayOrigin.set(position.x, position.y + 5, position.z);
    _groundRaycaster.set(_rayOrigin, _rayDown);
    const targets = this._nearby(position, 2);
    targets.push(this.world.ground);
    const hits = _groundRaycaster.intersectObjects(targets, false);
    if (hits.length === 0) return null;
    const hit = hits[0];
    const normal = hit.face ? hit.face.normal.clone().transformDirection(hit.object.matrixWorld) : UP.clone();
    const slopeAngle = THREE.MathUtils.radToDeg(normal.angleTo(UP));
    return { height: hit.point.y, normal, isRamp: hit.object.userData.collider === 'ramp', slopeAngle };
  }
}

const _forward = new THREE.Vector3();
const _right = new THREE.Vector3();
const _moveDir = new THREE.Vector3();
const _targetVel = new THREE.Vector3();

class Player {
  constructor(scene, physics) {
    this.physics = physics;
    this.position = new THREE.Vector3(0, 2, 6);
    this.velocity = new THREE.Vector3();
    this.yaw = Math.PI;
    this.grounded = false;
    this.jumpQueued = false;
    this._canJump = true;
    this.currentSpeed = 0;
    this._buildVisual(scene);
  }

  _buildVisual(scene) {
    this.mesh = new THREE.Group();
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xd8d8de, roughness: 0.5, metalness: 0.15 });
    const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.28, 0.75, 4, 8), bodyMat);
    torso.position.y = 1.05;
    torso.castShadow = true;
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), bodyMat);
    head.position.y = 1.62;
    head.castShadow = true;
    this.mesh.add(torso, head);
    this.mesh.position.copy(this.position);
    scene.add(this.mesh);
    this.headHeight = CONFIG.camera.firstPerson.headHeight;
  }

  requestJump() { this.jumpQueued = true; }

  update(delta, moveInput, running, cameraYaw) {
    const cfg = CONFIG.player;
    const ground = this.physics.sampleGroundHeight(this.position);
    const groundHeight = ground ? ground.height : 0;
    const distToGround = this.position.y - groundHeight;
    this.grounded = distToGround <= 0.08 && this.velocity.y <= 0.01;

    _forward.set(Math.sin(cameraYaw), 0, Math.cos(cameraYaw));
    _right.set(-Math.cos(cameraYaw), 0, Math.sin(cameraYaw));

    _moveDir.set(0, 0, 0);
    _moveDir.addScaledVector(_forward, moveInput.y);
    _moveDir.addScaledVector(_right, moveInput.x);

    const hasInput = _moveDir.lengthSq() > 0.0001;
    if (hasInput) _moveDir.normalize();

    const targetSpeed = running ? cfg.runSpeed : cfg.walkSpeed;
    _targetVel.copy(_moveDir).multiplyScalar(hasInput ? targetSpeed : 0);

    const control = this.grounded ? 1 : cfg.airControl;
    const rate = (hasInput ? cfg.acceleration : cfg.deceleration) * control;
    this.velocity.x = THREE.MathUtils.damp(this.velocity.x, _targetVel.x, rate, delta);
    this.velocity.z = THREE.MathUtils.damp(this.velocity.z, _targetVel.z, rate, delta);

    if (this.jumpQueued && this.grounded && this._canJump) {
      this.velocity.y = cfg.jumpForce;
      this.grounded = false;
      this._canJump = false;
    }
    if (!this.jumpQueued) this._canJump = true;
    this.jumpQueued = false;

    if (!this.grounded) this.velocity.y += cfg.gravity * delta;
    else if (this.velocity.y < 0) this.velocity.y = 0;

    this.position.x += this.velocity.x * delta;
    this.position.z += this.velocity.z * delta;
    this.physics.resolveHorizontal(this.position, cfg.radius);
    this.position.y += this.velocity.y * delta;

    const groundAfter = this.physics.sampleGroundHeight(this.position);
    if (groundAfter) {
      const heightDiff = groundAfter.height - this.position.y;
      const withinStep = heightDiff <= cfg.maxStepHeight && heightDiff > -0.5;
      if (this.velocity.y <= 0 && withinStep && (groundAfter.slopeAngle <= cfg.maxSlopeAngle)) {
        this.position.y = THREE.MathUtils.damp(this.position.y, groundAfter.height, 20, delta);
        this.velocity.y = 0;
        this.grounded = true;
      } else if (this.position.y < groundAfter.height - 0.5) {
        this.position.y = groundAfter.height;
        this.velocity.y = 0;
        this.grounded = true;
      }
    }

    if (this.position.y < -20) {
      this.position.set(0, 3, 6);
      this.velocity.set(0, 0, 0);
    }

    if (hasInput) {
      const targetYaw = Math.atan2(_moveDir.x, _moveDir.z);
      this.yaw = this._dampAngle(this.yaw, targetYaw, cfg.turnSmoothing, delta);
    }

    this.currentSpeed = Math.hypot(this.velocity.x, this.velocity.z);
    this.mesh.position.copy(this.position);
    this.mesh.rotation.y = this.yaw;
  }

  _dampAngle(current, target, rate, delta) {
    let diff = target - current;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    return current + diff * (1 - Math.exp(-rate * delta));
  }

  getHeadPosition(out) {
    out.set(this.position.x, this.position.y + this.headHeight, this.position.z);
    return out;
  }

  setVisualVisible(visible) { this.mesh.visible = visible; }
}

const _idealPos = new THREE.Vector3();
const _headPos = new THREE.Vector3();
const _rayDir = new THREE.Vector3();
const _raycaster = new THREE.Raycaster();
const CameraMode = { FIRST_PERSON: 'first', THIRD_PERSON: 'third' };

class CameraRig {
  constructor(camera, player, world) {
    this.camera = camera;
    this.player = player;
    this.world = world;
    this.mode = CameraMode.THIRD_PERSON;
    this.pitch = 0.18;
    this.yaw = player.yaw;
    this.currentDistance = CONFIG.camera.thirdPerson.distance;
    player.setVisualVisible(true);
  }

  toggleMode() {
    this.mode = this.mode === CameraMode.THIRD_PERSON ? CameraMode.FIRST_PERSON : CameraMode.THIRD_PERSON;
  }

  applyLook(dx, dy) {
    this.yaw -= dx;
    this.pitch -= dy;
    const minP = THREE.MathUtils.degToRad(CONFIG.camera.verticalMinDeg);
    const maxP = THREE.MathUtils.degToRad(CONFIG.camera.verticalMaxDeg);
    this.pitch = THREE.MathUtils.clamp(this.pitch, minP, maxP);
  }

  update(delta) {
    const targetDistance = this.mode === CameraMode.THIRD_PERSON ? CONFIG.camera.thirdPerson.distance : 0;
    this.currentDistance = THREE.MathUtils.damp(this.currentDistance, targetDistance, CONFIG.camera.switchLerp, delta);
    this.player.setVisualVisible(this.currentDistance > 0.35);
    this.player.getHeadPosition(_headPos);

    const dirX = Math.sin(this.yaw) * Math.cos(this.pitch);
    const dirY = Math.sin(this.pitch);
    const dirZ = Math.cos(this.yaw) * Math.cos(this.pitch);

    if (this.currentDistance > 0.35) {
      _idealPos.set(
        _headPos.x - dirX * this.currentDistance,
        _headPos.y - dirY * this.currentDistance + CONFIG.camera.thirdPerson.height * 0.15,
        _headPos.z - dirZ * this.currentDistance
      );
      const safeDistance = this._avoidWallClipping(_headPos, _idealPos);
      this.camera.position.lerp(
        new THREE.Vector3(
          _headPos.x - dirX * safeDistance,
          _headPos.y - dirY * safeDistance + CONFIG.camera.thirdPerson.height * 0.15,
          _headPos.z - dirZ * safeDistance
        ),
        Math.min(1, CONFIG.camera.thirdPerson.followLerp * delta)
      );
    } else {
      this.camera.position.copy(_headPos);
    }

    const minCamY = this.player.position.y + 0.15;
    if (this.camera.position.y < minCamY) this.camera.position.y = minCamY;

    const lookTarget = new THREE.Vector3(
      this.camera.position.x + dirX, this.camera.position.y + dirY, this.camera.position.z + dirZ
    );
    this.camera.lookAt(lookTarget);
  }

  _avoidWallClipping(from, idealPos) {
    _rayDir.subVectors(idealPos, from).normalize();
    const maxDist = from.distanceTo(idealPos);
    _raycaster.set(from, _rayDir);
    _raycaster.far = maxDist;
    _raycaster.near = 0;
    const hits = _raycaster.intersectObjects(this.world.collidables, false);
    if (hits.length > 0) {
      return Math.max(hits[0].distance - CONFIG.camera.thirdPerson.collisionPadding, CONFIG.camera.thirdPerson.minDistance);
    }
    return maxDist;
  }

  getYaw() { return this.yaw; }
}

class InputManager {
  constructor(canvas) {
    this.canvas = canvas;
    this.isMobile = this._detectMobile();
    this.state = {
      moveX: 0, moveY: 0, running: false, jumpPressed: false,
      lookDeltaX: 0, lookDeltaY: 0, camToggleRequested: false,
      pickupRequested: false, dropRequested: false,
      inventoryToggleRequested: false, attackRequested: false,
    };
    this._keys = new Set();
    this._pointerLocked = false;
    this._joystick = { active: false, pointerId: null, originX: 0, originY: 0, dx: 0, dy: 0 };
    this._look = { active: false, pointerId: null, lastX: 0, lastY: 0 };
    this._lastTapTime = 0;

    this._bindKeyboardMouse();
    if (this.isMobile) this._bindTouchControls();
    document.getElementById('mobile-controls').classList.toggle('active', this.isMobile);
  }

  _detectMobile() {
    return /Android|iPhone|iPad|iPod|Mobi/i.test(navigator.userAgent) || 'ontouchstart' in window;
  }

  _bindKeyboardMouse() {
    window.addEventListener('keydown', (e) => {
      this._keys.add(e.code);
      if (e.code === 'KeyC') this.state.camToggleRequested = true;
      if (e.code === 'KeyE') this.state.pickupRequested = true;
      if (e.code === 'KeyG') this.state.dropRequested = true;
      if (e.code === 'KeyI' || e.code === 'Tab') { e.preventDefault(); this.state.inventoryToggleRequested = true; }
    });
    window.addEventListener('keyup', (e) => this._keys.delete(e.code));

    this.canvas.addEventListener('click', () => {
      if (!this.isMobile) this.canvas.requestPointerLock?.();
    });
    document.addEventListener('pointerlockchange', () => {
      this._pointerLocked = document.pointerLockElement === this.canvas;
    });
    window.addEventListener('mousemove', (e) => {
      if (!this._pointerLocked) return;
      this.state.lookDeltaX += e.movementX * CONFIG.input.mouseSensitivity;
      this.state.lookDeltaY += e.movementY * CONFIG.input.mouseSensitivity;
    });
    window.addEventListener('mousedown', (e) => {
      if (this.isMobile || !this._pointerLocked) return;
      if (e.button === 0) this.state.attackRequested = true;
    });
    window.addEventListener('dblclick', (e) => {
      if (this.isMobile || !this._pointerLocked) return;
      if (e.button === 0) { this.state.pickupRequested = true; this.state.attackRequested = false; }
    });
    window.addEventListener('contextmenu', (e) => { if (this._pointerLocked) e.preventDefault(); });

    document.getElementById('cam-switch-btn').addEventListener('click', () => { this.state.camToggleRequested = true; });
    document.getElementById('inventory-btn').addEventListener('click', () => { this.state.inventoryToggleRequested = true; });
  }

  _readKeyboardMovement() {
    let x = 0, y = 0;
    if (this._keys.has('KeyW') || this._keys.has('ArrowUp')) y += 1;
    if (this._keys.has('KeyS') || this._keys.has('ArrowDown')) y -= 1;
    if (this._keys.has('KeyD') || this._keys.has('ArrowRight')) x += 1;
    if (this._keys.has('KeyA') || this._keys.has('ArrowLeft')) x -= 1;
    const len = Math.hypot(x, y);
    if (len > 1) { x /= len; y /= len; }
    this.state.moveX = x;
    this.state.moveY = y;
    this.state.running = this._keys.has('ShiftLeft') || this._keys.has('ShiftRight');
    this.state.jumpPressed = this._keys.has('Space');
  }

  _bindTouchControls() {
    const joystickZone = document.getElementById('joystick-zone');
    const joystickKnob = document.getElementById('joystick-knob');
    const joystickBase = document.getElementById('joystick-base');
    const lookZone = document.getElementById('look-zone');
    const jumpBtn = document.getElementById('jump-btn');
    const pickupBtn = document.getElementById('pickup-btn');
    const maxRadius = 45;

    joystickZone.addEventListener('pointerdown', (e) => {
      this._joystick.active = true;
      this._joystick.pointerId = e.pointerId;
      const rect = joystickBase.getBoundingClientRect();
      this._joystick.originX = rect.left + rect.width / 2;
      this._joystick.originY = rect.top + rect.height / 2;
      joystickZone.setPointerCapture(e.pointerId);
    });
    joystickZone.addEventListener('pointermove', (e) => {
      if (!this._joystick.active || e.pointerId !== this._joystick.pointerId) return;
      let dx = e.clientX - this._joystick.originX;
      let dy = e.clientY - this._joystick.originY;
      const dist = Math.hypot(dx, dy);
      if (dist > maxRadius) { dx = (dx / dist) * maxRadius; dy = (dy / dist) * maxRadius; }
      this._joystick.dx = dx / maxRadius;
      this._joystick.dy = dy / maxRadius;
      joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
    });
    const releaseJoystick = (e) => {
      if (this._joystick.pointerId !== null && e.pointerId !== this._joystick.pointerId) return;
      this._joystick.active = false;
      this._joystick.pointerId = null;
      this._joystick.dx = 0;
      this._joystick.dy = 0;
      joystickKnob.style.transform = 'translate(0px, 0px)';
    };
    joystickZone.addEventListener('pointerup', releaseJoystick);
    joystickZone.addEventListener('pointercancel', releaseJoystick);
    joystickZone.addEventListener('pointerleave', releaseJoystick);

    lookZone.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.changedTouches[0];
      this._look.active = true;
      this._look.pointerId = t.identifier;
      this._look.lastX = t.clientX;
      this._look.lastY = t.clientY;
      this._look.startX = t.clientX;
      this._look.startY = t.clientY;
      this._look.startTime = performance.now();
      this._look.moved = false;
    }, { passive: false });

    lookZone.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (!this._look.active) return;
      let touch = null;
      for (const t of e.changedTouches) {
        if (t.identifier === this._look.pointerId) { touch = t; break; }
      }
      if (!touch) return;
      const dx = touch.clientX - this._look.lastX;
      const dy = touch.clientY - this._look.lastY;
      this._look.lastX = touch.clientX;
      this._look.lastY = touch.clientY;
      if (Math.hypot(touch.clientX - this._look.startX, touch.clientY - this._look.startY) > 12) {
        this._look.moved = true;
      }
      this.state.lookDeltaX += dx * CONFIG.input.touchLookSensitivity;
      this.state.lookDeltaY += dy * CONFIG.input.touchLookSensitivity;
    }, { passive: false });

    const releaseLookTouch = (e) => {
      for (const t of e.changedTouches) {
        if (t.identifier === this._look.pointerId) {
          this._look.active = false;
          this._look.pointerId = null;

          // A quick tap that didn't drag = attack whatever the crosshair is over.
          // A second quick tap within 300ms of the last one = pickup instead.
          const heldTime = performance.now() - this._look.startTime;
          if (!this._look.moved && heldTime < 250) {
            const now = performance.now();
            if (now - this._lastTapTime < 300) {
              this.state.pickupRequested = true;
              this._lastTapTime = 0;
            } else {
              this.state.attackRequested = true;
              this._lastTapTime = now;
            }
          }
          break;
        }
      }
    };
    lookZone.addEventListener('touchend', releaseLookTouch, { passive: true });
    lookZone.addEventListener('touchcancel', releaseLookTouch, { passive: true });

    jumpBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); this.state.jumpPressed = true; });
    jumpBtn.addEventListener('pointerup', () => { this.state.jumpPressed = false; });
    jumpBtn.addEventListener('pointercancel', () => { this.state.jumpPressed = false; });

    pickupBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); this.state.pickupRequested = true; });
  }

  _readJoystickMovement() {
    const { dx, dy } = this._joystick;
    const magnitude = Math.hypot(dx, dy);
    if (magnitude < CONFIG.input.joystickDeadzone) {
      this.state.moveX = 0; this.state.moveY = 0; this.state.running = false;
      return;
    }
    this.state.moveX = dx;
    this.state.moveY = -dy;
    this.state.running = magnitude > CONFIG.input.joystickRunThreshold;
  }

  update() {
    if (this.isMobile) this._readJoystickMovement();
    else this._readKeyboardMovement();
  }

  consumeLookDelta() {
    const dx = this.state.lookDeltaX, dy = this.state.lookDeltaY;
    this.state.lookDeltaX = 0; this.state.lookDeltaY = 0;
    return { dx, dy };
  }
  consumeCamToggle() { const v = this.state.camToggleRequested; this.state.camToggleRequested = false; return v; }
  consumePickupRequested() { const v = this.state.pickupRequested; this.state.pickupRequested = false; return v; }
  consumeDropRequested() { const v = this.state.dropRequested; this.state.dropRequested = false; return v; }
  consumeInventoryToggle() { const v = this.state.inventoryToggleRequested; this.state.inventoryToggleRequested = false; return v; }
  consumeAttackRequested() { const v = this.state.attackRequested; this.state.attackRequested = false; return v; }
}

class Controls {
  constructor(input, player, cameraRig) {
    this.input = input;
    this.player = player;
    this.cameraRig = cameraRig;
  }
  update(delta) {
    this.input.update();
    const { dx, dy } = this.input.consumeLookDelta();
    if (dx !== 0 || dy !== 0) this.cameraRig.applyLook(dx, dy);
    if (this.input.consumeCamToggle()) this.cameraRig.toggleMode();
    if (this.input.state.jumpPressed) this.player.requestJump();
    const moveInput = { x: this.input.state.moveX, y: this.input.state.moveY };
    const running = this.input.state.running;
    this.player.update(delta, moveInput, running, this.cameraRig.getYaw());
  }
}

class Engine {
  constructor({ onUpdate, onRender }) {
    this.onUpdate = onUpdate;
    this.onRender = onRender;
    this.running = false;
    this._lastTime = performance.now();
    this._fpsFrames = 0;
    this._fpsLast = performance.now();
    this.fps = 60;
  }
  start() {
    this.running = true;
    this._lastTime = performance.now();
    requestAnimationFrame((t) => this._loop(t));
  }
  _loop(now) {
    if (!this.running) return;
    let delta = (now - this._lastTime) / 1000;
    this._lastTime = now;
    delta = Math.min(delta, 1 / 20);
    this.onUpdate(delta);
    this.onRender();
    this._fpsFrames++;
    if (now - this._fpsLast >= 500) {
      this.fps = Math.round((this._fpsFrames * 1000) / (now - this._fpsLast));
      this._fpsFrames = 0;
      this._fpsLast = now;
    }
    requestAnimationFrame((t) => this._loop(t));
  }
}

class EventBus {
  constructor() { this._listeners = new Map(); }
  on(event, fn) {
    if (!this._listeners.has(event)) this._listeners.set(event, []);
    this._listeners.get(event).push(fn);
    return () => this.off(event, fn);
  }
  off(event, fn) {
    const arr = this._listeners.get(event);
    if (!arr) return;
    const i = arr.indexOf(fn);
    if (i >= 0) arr.splice(i, 1);
  }
  emit(event, payload) {
    const arr = this._listeners.get(event);
    if (!arr) return;
    for (const fn of arr.slice()) fn(payload);
  }
}

const WEAPON_BASE = {
  id: 'base', name: 'Unknown', type: 'melee',
  damage: 20, headMultiplier: 2.0, limbMultiplier: 0.7,
  attackRate: 500, range: 2.2, color: 0xaaaaaa,
};

const WEAPON_DATABASE = {
  sword: { ...WEAPON_BASE, id: 'sword', name: 'Sword', damage: 28, attackRate: 450, range: 2.2, color: 0xc0c0c0 },
  axe:   { ...WEAPON_BASE, id: 'axe',   name: 'Axe',   damage: 40, attackRate: 700, range: 2.0, color: 0x8a5a2b },
  spear: { ...WEAPON_BASE, id: 'spear', name: 'Spear', damage: 22, attackRate: 380, range: 2.8, color: 0x6b4a2a },
  dagger:{ ...WEAPON_BASE, id: 'dagger',name: 'Dagger',damage: 16, attackRate: 260, range: 1.6, color: 0xb0b0b0 },
  hammer:{ ...WEAPON_BASE, id: 'hammer',name: 'Hammer',damage: 50, attackRate: 900, range: 2.0, color: 0x555555 },
};

function createWeaponInstance(weaponId) {
  const template = WEAPON_DATABASE[weaponId];
  if (!template) return null;
  return { ...template, lastAttackTime: -Infinity };
}

class RaycastManager {
  constructor(camera, world) {
    this.camera = camera;
    this.world = world;
    this.raycaster = new THREE.Raycaster();
    this.lastHit = null;
    this._targetsDirty = true;
    this._cachedTargets = [];
  }
  markDirty() { this._targetsDirty = true; }
  _rebuildTargets() {
    const targets = [];
    for (const e of this.world.enemies) targets.push(e.headMesh, e.bodyMesh);
    for (const p of this.world.pickups) targets.push(p.mesh);
    for (const c of this.world.collidables) targets.push(c);
    targets.push(this.world.ground);
    this._cachedTargets = targets;
    this._targetsDirty = false;
  }
  queryCenter(maxDistance = 100) {
    if (this._targetsDirty) this._rebuildTargets();
    this.raycaster.setFromCamera({ x: 0, y: 0 }, this.camera);
    this.raycaster.far = maxDistance;
    const hits = this.raycaster.intersectObjects(this._cachedTargets, false);
    this.lastHit = hits.length > 0 ? hits[0] : null;
    return this.lastHit;
  }
  classifyHit(hit) {
    if (!hit) return { kind: 'none' };
    const obj = hit.object;
    if (obj.userData.entityType === 'enemy') return { kind: 'enemy', enemy: obj.userData.enemyRef, bodyPart: obj.userData.bodyPart, hit };
    if (obj.userData.entityType === 'pickup') return { kind: 'pickup', pickup: obj.userData.pickupRef, hit };
    if (obj.userData.isGround) return { kind: 'ground', hit };
    if (obj.userData.collider) return { kind: 'wall', hit };
    return { kind: 'other', hit };
  }
}

class PointerManager {
  constructor(raycastManager, player) {
    this.raycastManager = raycastManager;
    this.player = player;
    this.el = document.getElementById('crosshair');
    this._swingTimer = 0;
  }
  update(delta, isAttacking) {
    const hit = this.raycastManager.queryCenter(100);
    const info = this.raycastManager.classifyHit(hit);
    this.el.classList.toggle('target-lock', info.kind === 'enemy');

    const movementExpand = Math.min(1, this.player.currentSpeed / 6);
    this.el.classList.toggle('expanded', movementExpand > 0.3);

    if (isAttacking) { this.el.classList.add('swing'); this._swingTimer = 0.15; }
    if (this._swingTimer > 0) {
      this._swingTimer -= delta;
      if (this._swingTimer <= 0) this.el.classList.remove('swing');
    }
    return info;
  }
}

class DamageManager {
  constructor(eventBus, world) {
    this.bus = eventBus;
    this.world = world;
  }
  applyHit(weapon, hitInfo) {
    if (hitInfo.kind !== 'enemy') return null;
    const enemy = hitInfo.enemy;
    if (!enemy.alive) return null;

    const multiplier = hitInfo.bodyPart === 'head' ? weapon.headMultiplier
      : hitInfo.bodyPart === 'limb' ? weapon.limbMultiplier : 1;
    const damage = Math.round(weapon.damage * multiplier);
    enemy.health = Math.max(0, enemy.health - damage);
    this.bus.emit('hit', { enemy, damage, bodyPart: hitInfo.bodyPart, headshot: hitInfo.bodyPart === 'head' });

    const mat = enemy.bodyMesh.material;
    const originalEmissive = mat.emissive.getHex();
    mat.emissive.setHex(0xff2222);
    mat.emissiveIntensity = 0.9;
    setTimeout(() => { mat.emissive.setHex(originalEmissive); mat.emissiveIntensity = 0; }, 90);

    if (enemy.health <= 0 && enemy.alive) {
      enemy.alive = false;
      this.bus.emit('death', { enemy });
      enemy.mesh.rotation.z = Math.PI / 2.2;
      enemy.mesh.position.y = 0.2;
      setTimeout(() => this.world.removeEnemy(enemy), 2500);
    }
    return { damage, headshot: hitInfo.bodyPart === 'head' };
  }
}

class WeaponManager {
  constructor(eventBus) {
    this.bus = eventBus;
    this.inventory = [];
    this.equippedIndex = -1;
  }
  get equipped() { return this.equippedIndex >= 0 ? this.inventory[this.equippedIndex] : null; }

  addWeapon(weaponId) {
    const existing = this.inventory.find((w) => w.id === weaponId);
    if (existing) { this.bus.emit('inventory-changed', { inventory: this.inventory }); return existing; }
    const weapon = createWeaponInstance(weaponId);
    this.inventory.push(weapon);
    if (this.equippedIndex === -1) this.equip(this.inventory.length - 1);
    this.bus.emit('inventory-changed', { inventory: this.inventory });
    return weapon;
  }

  equip(index) {
    if (index < 0 || index >= this.inventory.length) return;
    this.equippedIndex = index;
    this.bus.emit('weapon-equipped', { weapon: this.equipped });
  }

  dropEquipped() {
    if (!this.equipped) return null;
    const dropped = this.inventory.splice(this.equippedIndex, 1)[0];
    this.equippedIndex = this.inventory.length > 0 ? 0 : -1;
    this.bus.emit('inventory-changed', { inventory: this.inventory });
    this.bus.emit('weapon-equipped', { weapon: this.equipped });
    return dropped;
  }
}

class AttackManager {
  constructor({ eventBus, weaponManager, damageManager, raycastManager }) {
    this.bus = eventBus;
    this.weapons = weaponManager;
    this.damage = damageManager;
    this.raycast = raycastManager;
    this.unarmedDamage = 8;
    this.unarmedRange = 1.6;
    this.unarmedRate = 550;
    this._lastUnarmedAttack = -Infinity;
  }

  requestAttack(now) {
    const weapon = this.weapons.equipped;

    if (!weapon) {
      if (now - this._lastUnarmedAttack < this.unarmedRate) return;
      this._lastUnarmedAttack = now;
      const hit = this.raycast.queryCenter(this.unarmedRange);
      const info = this.raycast.classifyHit(hit);
      let anyHit = null;
      if (info.kind === 'enemy') {
        anyHit = this.damage.applyHit({ damage: this.unarmedDamage, headMultiplier: 2, limbMultiplier: 0.7 }, info);
      }
      this.bus.emit('attack-swing', { weapon: null });
      if (anyHit) this.bus.emit('hitmarker', anyHit);
      return;
    }

    if (now - weapon.lastAttackTime < weapon.attackRate) return;
    weapon.lastAttackTime = now;

    const hit = this.raycast.queryCenter(weapon.range);
    const info = this.raycast.classifyHit(hit);
    let anyHit = null;
    if (info.kind === 'enemy') anyHit = this.damage.applyHit(weapon, info);

    this.bus.emit('attack-swing', { weapon });
    if (anyHit) this.bus.emit('hitmarker', anyHit);
  }
}

class PickupManager {
  constructor({ eventBus, world, player, weaponManager }) {
    this.bus = eventBus;
    this.world = world;
    this.player = player;
    this.weapons = weaponManager;
    this.nearest = null;
    this.pickupRange = 3.2;
  }
  update() {
    let closest = null;
    let closestDist = this.pickupRange;
    for (const pickup of this.world.pickups) {
      if (pickup.collected) continue;
      const dist = this.player.position.distanceTo(pickup.mesh.position);
      if (dist < closestDist) { closestDist = dist; closest = pickup; }
    }
    this.nearest = closest;
    this.bus.emit('pickup-nearby', { pickup: closest });
    return closest;
  }
  collect() {
    const pickup = this.nearest;
    if (!pickup || pickup.collected) return;
    pickup.collected = true;

    if (pickup.type === 'weapon') this.weapons.addWeapon(pickup.weaponId);
    else if (pickup.type === 'health') this.bus.emit('health-pickup', { amount: pickup.amount });
    else this.bus.emit('generic-pickup', { pickup });

    this.bus.emit('pickup-collected', { pickup });

    const mesh = pickup.mesh;
    const duration = 220;
    const start = performance.now();
    const startScale = mesh.scale.x;
    const anim = () => {
      const t = Math.min(1, (performance.now() - start) / duration);
      const s = startScale * (1 - t);
      mesh.scale.set(s, s, s);
      if (t < 1) requestAnimationFrame(anim);
      else this.world.removePickup(pickup);
    };
    requestAnimationFrame(anim);
  }
}

class DropManager {
  constructor({ eventBus, world, player, cameraRig, weaponManager }) {
    this.bus = eventBus;
    this.world = world;
    this.player = player;
    this.cameraRig = cameraRig;
    this.weapons = weaponManager;
  }
  _dropPosition() {
    const yaw = this.cameraRig.getYaw();
    const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
    return this.player.position.clone().addScaledVector(forward, 1.4).setY(0.4);
  }
  dropEquippedWeapon() {
    const dropped = this.weapons.dropEquipped();
    if (!dropped) return;
    const pos = this._dropPosition();
    const pickup = this.world.addDroppedItem({ type: 'weapon', weaponId: dropped.id, label: dropped.name, position: [pos.x, pos.y, pos.z] });
    this.bus.emit('weapon-dropped', { weapon: dropped, pickup });
  }
}

const WEAPON_ICONS = { sword: '🗡️', axe: '🪓', spear: '🔱', dagger: '🔪', hammer: '🔨' };

class UIManager {
  constructor(eventBus, weaponManager, dropManager) {
    this.bus = eventBus;
    this.weapons = weaponManager;
    this.dropManager = dropManager;
    this.weaponHud = document.getElementById('weapon-hud');
    this.interactPrompt = document.getElementById('interact-prompt');
    this.pickupBtn = document.getElementById('pickup-btn');
    this.hitMarker = document.getElementById('hit-marker');
    this.damageFlash = document.getElementById('damage-flash');
    this.pickupToast = document.getElementById('pickup-toast');
    this.inventoryPanel = document.getElementById('inventory-panel');
    this.inventoryGrid = document.getElementById('inventory-grid');
    this.dropZone = document.getElementById('inventory-drop-zone');
    this._toastTimer = null;
    this.inventoryOpen = false;
    this._dragIndex = null;
    this._dragEl = null;

    this.bus.on('weapon-equipped', ({ weapon }) => { this._renderWeapon(weapon); this._renderInventoryGrid(); });
    this.bus.on('pickup-nearby', ({ pickup }) => this._renderPrompt(pickup));
    this.bus.on('hitmarker', () => this._showHitMarker());
    this.bus.on('player-damaged', () => this._flashDamage());
    this.bus.on('pickup-collected', ({ pickup }) => { this._showToast('Picked up ' + pickup.label); this._renderInventoryGrid(); });
    this.bus.on('inventory-changed', () => this._renderInventoryGrid());

    document.getElementById('inventory-close').addEventListener('click', () => this.closeInventory());
    this.inventoryPanel.addEventListener('click', (e) => { if (e.target === this.inventoryPanel) this.closeInventory(); });

    this.dropZone.addEventListener('dragover', (e) => { e.preventDefault(); this.dropZone.classList.add('drag-over'); });
    this.dropZone.addEventListener('dragleave', () => this.dropZone.classList.remove('drag-over'));
    this.dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      this.dropZone.classList.remove('drag-over');
      if (this._dragIndex !== null) { this._dropWeaponAt(this._dragIndex); this._dragIndex = null; }
    });

    this._renderWeapon(null);
  }

  toggleInventory() { this.inventoryOpen ? this.closeInventory() : this.openInventory(); }
  openInventory() { this.inventoryOpen = true; this._renderInventoryGrid(); this.inventoryPanel.classList.add('visible'); }
  closeInventory() { this.inventoryOpen = false; this.inventoryPanel.classList.remove('visible'); }

  _renderInventoryGrid() {
    this.inventoryGrid.innerHTML = '';
    this.dropZone.classList.remove('drag-over');

    if (this.weapons.inventory.length === 0) {
      const msg = document.createElement('div');
      msg.id = 'inventory-empty-msg';
      msg.textContent = 'No weapons carried yet. Walk up to a weapon and pickup.';
      this.inventoryGrid.appendChild(msg);
      return;
    }

    this.weapons.inventory.forEach((weapon, index) => {
      const slot = document.createElement('div');
      slot.className = 'inv-slot' + (index === this.weapons.equippedIndex ? ' equipped' : '');
      slot.draggable = true;
      slot.innerHTML = `
        <div class="slot-icon">${WEAPON_ICONS[weapon.id] || '⚔️'}</div>
        <div class="slot-label">${weapon.name}</div>
        <div class="slot-stat">${weapon.damage}</div>
      `;

      // Tap/click a slot to equip it.
      slot.addEventListener('click', () => { this.weapons.equip(index); this.closeInventory(); });

      // --- Desktop drag-and-drop (HTML5 DnD) ---
      slot.addEventListener('dragstart', (e) => {
        this._dragIndex = index;
        e.dataTransfer.effectAllowed = 'move';
      });

      // --- Mobile drag (pointer-based, since HTML5 DnD doesn't fire on touch) ---
      slot.addEventListener('pointerdown', (e) => {
        this._dragIndex = index;
        this._dragEl = slot;
        slot.setPointerCapture(e.pointerId);
      });
      slot.addEventListener('pointermove', (e) => {
        if (this._dragIndex !== index) return;
        const overDropZone = this._isPointOverElement(e.clientX, e.clientY, this.dropZone);
        this.dropZone.classList.toggle('drag-over', overDropZone);
      });
      slot.addEventListener('pointerup', (e) => {
        if (this._dragIndex !== index) return;
        const overDropZone = this._isPointOverElement(e.clientX, e.clientY, this.dropZone);
        this.dropZone.classList.remove('drag-over');
        if (overDropZone) this._dropWeaponAt(index);
        this._dragIndex = null;
        this._dragEl = null;
      });

      this.inventoryGrid.appendChild(slot);
    });
  }

  _isPointOverElement(x, y, el) {
    const rect = el.getBoundingClientRect();
    return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
  }

  _dropWeaponAt(index) {
    // Equip the dragged weapon first if it isn't already, then drop it.
    if (index !== this.weapons.equippedIndex) this.weapons.equip(index);
    this.dropManager.dropEquippedWeapon();
    this._renderInventoryGrid();
  }

  _renderWeapon(weapon) {
    this.weaponHud.textContent = weapon ? weapon.name.toUpperCase() : 'UNARMED';
  }

  _renderPrompt(pickup) {
    if (!pickup) {
      this.interactPrompt.classList.remove('visible');
      this.pickupBtn.classList.remove('visible');
      return;
    }
    this.interactPrompt.textContent = `Press Pickup — ${pickup.label}`;
    this.interactPrompt.classList.add('visible');
    this.pickupBtn.classList.add('visible');
  }

  _showHitMarker() {
    this.hitMarker.classList.remove('show');
    void this.hitMarker.offsetWidth;
    this.hitMarker.classList.add('show');
  }

  _flashDamage() {
    this.damageFlash.classList.add('show');
    setTimeout(() => this.damageFlash.classList.remove('show'), 260);
  }

  _showToast(text) {
    this.pickupToast.textContent = text;
    this.pickupToast.classList.add('show');
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => this.pickupToast.classList.remove('show'), 1400);
  }
}

class Game {
  constructor() {
    const canvas = document.getElementById('game-canvas');

    this.gameRenderer = new GameRenderer(canvas);
    this.world = new World(this.gameRenderer.scene);
    this.physics = new PhysicsWorld(this.world);
    this.player = new Player(this.gameRenderer.scene, this.physics);
    this.cameraRig = new CameraRig(this.gameRenderer.camera, this.player, this.world);
    this.input = new InputManager(canvas);
    this.controls = new Controls(this.input, this.player, this.cameraRig);

    this.bus = new EventBus();
    this.weaponManager = new WeaponManager(this.bus);
    this.raycastManager = new RaycastManager(this.gameRenderer.camera, this.world);
    this.pointerManager = new PointerManager(this.raycastManager, this.player);
    this.damageManager = new DamageManager(this.bus, this.world);
    this.attackManager = new AttackManager({
      eventBus: this.bus, weaponManager: this.weaponManager,
      damageManager: this.damageManager, raycastManager: this.raycastManager,
    });
    this.pickupManager = new PickupManager({
      eventBus: this.bus, world: this.world, player: this.player, weaponManager: this.weaponManager,
    });
    this.dropManager = new DropManager({
      eventBus: this.bus, world: this.world, player: this.player,
      cameraRig: this.cameraRig, weaponManager: this.weaponManager,
    });
    this.uiManager = new UIManager(this.bus, this.weaponManager, this.dropManager);

    this.bus.on('death', () => this.raycastManager.markDirty());
    this.bus.on('pickup-collected', () => this.raycastManager.markDirty());
    this.bus.on('weapon-dropped', () => this.raycastManager.markDirty());

    this.fpsCounter = document.getElementById('fps-counter');
    this._elapsed = 0;

    this.engine = new Engine({
      onUpdate: (delta) => this._update(delta),
      onRender: () => this._render(),
    });

    this._hideLoadingScreen();
    this.engine.start();
  }

  _update(delta) {
    this._elapsed += delta;
    const now = performance.now();

    this.controls.update(delta);
    this.cameraRig.update(delta);
    this.world.update(delta, this._elapsed);

    const attackRequested = this.input.consumeAttackRequested();
    this.pointerManager.update(delta, attackRequested);

    if (attackRequested) this.attackManager.requestAttack(now);

    this.pickupManager.update();
    if (this.input.consumePickupRequested()) this.pickupManager.collect();

    if (this.input.consumeDropRequested()) this.dropManager.dropEquippedWeapon();

    if (this.input.consumeInventoryToggle()) this.uiManager.toggleInventory();

    this.fpsCounter.textContent = `FPS: ${this.engine.fps}`;
  }

  _render() { this.gameRenderer.render(); }

  _hideLoadingScreen() {
    const screen = document.getElementById('loading-screen');
    setTimeout(() => screen.classList.add('hidden'), 300);
  }
}

window.addEventListener('DOMContentLoaded', () => {
  tryLockLandscape();
  document.body.addEventListener('click', tryLockLandscape, { once: true });
  document.body.addEventListener('touchstart', tryLockLandscape, { once: true });
  new Game();
});
  </script>
